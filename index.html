/* ─── SWIPE TO DELETE (Admin) ─── */
let _swipeRow=null, _swipeStartX=0, _swipeDx=0, _swipeActive=false, _swipeMoved=false;
function swipeCloseAll() {
  document.querySelectorAll('.swipe-row.swiped').forEach(r => r.classList.remove('swiped'));
}
function swipeStart(e, row) {
  if (!canAdmin()) return;
  if (!row) return;
  // If the row is already open and the user taps the content area, close it instead of blocking clicks.
  const isDeleteBtn = e.target && (e.target.classList?.contains('swipe-del-btn') || e.target.closest?.('.swipe-del-btn'));
  // Let the delete button click behave normally; don't start swipe tracking.
  if (isDeleteBtn) return;
  if (row.classList.contains('swiped') && !isDeleteBtn) {
    row.classList.remove('swiped');
    return;
  }
  _swipeRow = row;
  _swipeStartX = e.clientX || (e.touches && e.touches[0] && e.touches[0].clientX) || 0;
  _swipeDx = 0;
  _swipeActive = true;
  _swipeMoved = false;
  // close others
  document.querySelectorAll('.swipe-row.swiped').forEach(r => { if (r !== row) r.classList.remove('swiped'); });
  row.classList.add('swiping');
  try { if (e.pointerId != null) row.setPointerCapture(e.pointerId); } catch(_) {}
}
function swipeMove(e, row) {
  if (!_swipeActive || row !== _swipeRow) return;
  const x = e.clientX || (e.touches && e.touches[0] && e.touches[0].clientX) || 0;
  _swipeDx = x - _swipeStartX;
  // We only care about left swipe; clamp to [-92, 0]
  const dx = Math.max(-92, Math.min(0, _swipeDx));
  if (Math.abs(dx) > 10) _swipeMoved = true;
  const content = row.querySelector('.swipe-content');
  if (content) content.style.transform = `translateX(${dx}px)`;
  // Prevent scrolling while swiping horizontally (mostly for touch).
  if (Math.abs(dx) > 10 && e.cancelable) e.preventDefault();
}
function swipeEnd(e, row) {
  if (!_swipeActive || row !== _swipeRow) return;
  _swipeActive = false;
  row.classList.remove('swiping');
  // If it was a tap (not a swipe), let the underlying row click handler run.
  if (!_swipeMoved) {
    const li = row.querySelector('.list-item');
    // Defer so we don't fight pointer handlers.
    setTimeout(() => { try { li?.click(); } catch(_) {} }, 0);
    const content = row.querySelector('.swipe-content');
    if (content) content.style.transform = '';
    _swipeRow = null;
    _swipeDx = 0;
    _swipeMoved = false;
    return;
  }
  const open = (_swipeDx < -40);
  const content = row.querySelector('.swipe-content');
  if (content) content.style.transform = '';
  if (open) row.classList.add('swiped');
  else row.classList.remove('swiped');

/* ─── DONOR AUTO-SUGGEST ─── */
function donorSuggest(q) {
  const box = document.getElementById('df-suggest');
  if (!box) return;
  q = (q||'').trim().toLowerCase();
  if (q.length < 2) { box.style.display='none'; return; }
  // deduplicate by name — pick most recent record per unique donor name
  const seen = new Map();
  donations.slice().reverse().forEach(d => {
    const key = (d.name||'').toLowerCase();
    if (!seen.has(key)) seen.set(key, d);
  });
  const score = (txt) => {
    const t = (txt||'').toLowerCase();
    if (!t) return -1;
    if (t === q) return 300;
    if (t.startsWith(q)) return 200;
    const i = t.indexOf(q);
    return i >= 0 ? (100 - i) : -1;
  };
  const matches = [...seen.values()]
    .map(d => ({ d, s: score(d.name) }))
    .filter(x => x.s >= 0)
    .sort((a,b) => b.s - a.s)
    .slice(0, 8)
    .map(x => x.d);
  if (!matches.length) { box.style.display='none'; return; }
  box.style.display = 'block';
  box.innerHTML = matches.map(d => {
    const sub = [d.nameTe, d.city||d.cityTe].filter(Boolean).join(' · ');
    return `<div onclick="donorFill('${d.id}')" style="padding:10px 14px;cursor:pointer;border-bottom:1px solid #F5EAD8;display:flex;flex-direction:column;gap:2px" onmouseover="this.style.background='#FFF4E0'" onmouseout="this.style.background='#fff'">
      <span style="font-size:13px;font-weight:700;color:var(--text)">${d.name}</span>
      ${sub?`<span style="font-size:11px;color:var(--text3);font-family:'Tiro Telugu',serif">${sub}</span>`:''}
    </div>`;
  }).join('');
}

function donFieldSuggest(q, prefix, field) {
  const inputId = prefix + '-' + (field === 'relname' ? 'relname'
                  : field === 'address' ? 'addr'
                  : field === 'city' ? 'city'
                  : field === 'notes' ? 'notes'
                  : field);
  const boxId = prefix + '-' + (field === 'relname' ? 'relname-suggest'
                : field === 'address' ? 'addr-suggest'
                : field === 'city' ? 'city-suggest'
                : field === 'notes' ? 'notes-suggest'
                : field + '-suggest');
  const box = document.getElementById(boxId);
  if (!box) return;
  q = (q||'').trim().toLowerCase();
  if (q.length < 2) { box.style.display='none'; return; }

  const getVal = (d) => {
    if (field === 'relname') return d.relname || '';
    if (field === 'address') return d.address || '';
    if (field === 'city') return d.city || '';
    if (field === 'notes') return d.notes || '';
    return '';
  };
  const label = (d) => {
    if (field === 'address') return (getVal(d)||'').split('\n')[0].slice(0, 80);
    return (getVal(d)||'').slice(0, 80);
  };

  const seen = new Map();
  donations.slice().reverse().forEach(d => {
    const v = (getVal(d)||'').trim();
    if (!v) return;
    const key = v.toLowerCase();
    if (!seen.has(key)) seen.set(key, d);
  });
  const score = (txt) => {
    const t = (txt||'').toLowerCase();
    if (!t) return -1;
    if (t === q) return 300;
    if (t.startsWith(q)) return 200;
    const i = t.indexOf(q);
    return i >= 0 ? (100 - i) : -1;
  };
  const matches = [...seen.values()]
    .map(d => ({ d, s: score(getVal(d)) }))
    .filter(x => x.s >= 0)
    .sort((a,b) => b.s - a.s)
    .slice(0, 8)
    .map(x => x.d);
  if (!matches.length) { box.style.display='none'; return; }

  box.style.display = 'block';
  box.innerHTML = matches.map(d => {
    const main = label(d).replace(/</g,'&lt;').replace(/>/g,'&gt;');
    const sub = [d.name, d.city].filter(Boolean).join(' · ');
    const value = (getVal(d)||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    return `<div onclick="donFieldPick('${inputId}','${boxId}','${value}')" style="padding:10px 14px;cursor:pointer;border-bottom:1px solid #F5EAD8;display:flex;flex-direction:column;gap:2px" onmouseover="this.style.background='#FFF4E0'" onmouseout="this.style.background='#fff'">
      <span style="font-size:13px;font-weight:700;color:var(--text)">${main}</span>
      ${sub?`<span style="font-size:11px;color:var(--text3)">${sub}</span>`:''}
    </div>`;
  }).join('');
}

function donFieldPick(inputId, boxId, val) {
  const el = document.getElementById(inputId);
  if (el) el.value = val || '';
  const box = document.getElementById(boxId);
  if (box) box.style.display = 'none';
}
function donorFill(id) {
  const d = donations.find(x => x.id === id);
  if (!d) return;
  const set = (elId, val) => { const el=document.getElementById(elId); if(el) el.value=val||''; };
  const setTA = (elId, val) => { const el=document.getElementById(elId); if(el) el.value=val||''; };
  set('df-name',     d.name);
  set('df-name-te',  d.nameTe);
  set('df-relname',  d.relname);
  set('df-mobile',   d.mobile);
  setTA('df-addr',    d.address);
  setTA('df-addr-te', d.addressTe);
  set('df-city',     d.city);
  set('df-city-te',  d.cityTe);
  // Donation-specific fill (type/amount/payment/notes) from the most recent record
  const dtype = (d.donationType === 'other') ? 'other' : 'money';
  const typeSel = document.getElementById('df-type');
  if (typeSel) typeSel.value = dtype;
  // Toggle relevant fields + clear money-only state if switching to other.
  setDonType(dtype, 'df', typeSel);
  if (dtype === 'money') {
    const amt = (parseFloat(d.amount)||0);
    const amtEl = document.getElementById('df-amt');
    if (amtEl) amtEl.value = amt || '';
    const words = document.getElementById('df-words');
    if (words) words.textContent = amt ? (d.amountWords || amtWords(amt)) : '—';
    // New record: always reset payment status (don't inherit from past donation).
    setRecv('no');
    // Never auto-fill receipt image from old record; keep it empty.
    receiptDataUrl = null;
    ['df-receipt-preview','df-receipt-actions'].forEach(x=>{ const el=document.getElementById(x); if(el) el.style.display='none'; });
    const ph=document.getElementById('df-upload-placeholder'); if(ph) ph.style.display='flex';
  } else {
    set('df-notes', d.notes || '');
    setRecv('no');
    receiptDataUrl = null;
  }
  // relation select
  const rel = document.getElementById('df-rel');
  if (rel && d.relation) rel.value = d.relation;
  // state select
  const st = document.getElementById('df-state');
  if (st && d.state) st.value = d.state;
  // hide suggestion box
  const box = document.getElementById('df-suggest');
  if (box) box.style.display = 'none';
  showToast('✓ Donor details filled from previous record');
}

document.addEventListener('click', function(e) {

    ['df-name','df-suggest'],

/* ─── UPDATE DONATION ─── */
async function updateDonation() {
  const name=(document.getElementById('ef2-name')?.value||'').trim();
  const dtype=(document.getElementById('ef2-type')?.value||donType||'money');
  const notes=(document.getElementById('ef2-notes')?.value||'').trim();
  const amt=parseFloat(document.getElementById('ef2-amt')?.value)||0;
  if(!name){showToast('⚠ Please enter donor name');return;}
  if(dtype==='other' && !notes){showToast('⚠ Please add notes for "Other" donation');return;}
  if(dtype==='money' && !amt){showToast('⚠ Please enter amount');return;}
  const don=donations.find(d=>d.id===editingDonId);
  if(!don) return;

  // Compute next values without mutating, so we can detect "no changes".
  const nextType = dtype==='other' ? 'other' : 'money';
  const nextReceiptImage =
    (nextType!=='money') ? null
    : (receiptDataUrl === '__REMOVED__') ? null
    : (receiptDataUrl ? receiptDataUrl : (don.receiptImage || null));
  const nextReceived = (nextType==='money') ? (donReceived||don.received||'no') : 'no';
  const nextAmount = (nextType==='money') ? amt : null;
  const nextAmountWords = (nextType==='money') ? amtWords(amt) : '';
  const nextNotes = (nextType==='other') ? notes : '';

  const noChanges =
    _sameText(don.date, document.getElementById('ef2-date')?.value||don.date) &&
    _sameText(don.name, name) &&
    _sameText(don.nameTe, (document.getElementById('ef2-name-te')?.value||'').trim()) &&
    _sameText(don.relation, document.getElementById('ef2-rel')?.value||'') &&
    _sameText(don.relname, document.getElementById('ef2-relname')?.value||'') &&
    _sameText(don.address, document.getElementById('ef2-addr')?.value||'') &&
    _sameText(don.addressTe, (document.getElementById('ef2-addr-te')?.value||'').trim()) &&
    _sameText(don.city, document.getElementById('ef2-city')?.value||'') &&
    _sameText(don.cityTe, (document.getElementById('ef2-city-te')?.value||'').trim()) &&
    _sameText(don.state, document.getElementById('ef2-state')?.value||'') &&
    _sameText(don.mobile, document.getElementById('ef2-mobile')?.value||'') &&
    _sameText(don.donationType||'money', nextType) &&
    _sameText(don.notes||'', nextNotes) &&
    (_sameNum(don.amount||0, nextAmount||0) && (_normText(don.amountWords||'') === _normText(nextAmountWords))) &&
    _sameText(don.received||'no', nextReceived) &&
    _sameText(don.receiptImage||'', nextReceiptImage||'');

  if (noChanges) { showToast('ℹ️ No changes to update'); return; }

  don.date=document.getElementById('ef2-date')?.value||don.date;
  don.name=name;
  don.nameTe=(document.getElementById('ef2-name-te')?.value||'').trim();
  don.relation=document.getElementById('ef2-rel')?.value||'';
  don.relname=document.getElementById('ef2-relname')?.value||'';
  don.address=document.getElementById('ef2-addr')?.value||'';
  don.addressTe=(document.getElementById('ef2-addr-te')?.value||'').trim();
  don.city=document.getElementById('ef2-city')?.value||'';
  don.cityTe=(document.getElementById('ef2-city-te')?.value||'').trim();
  don.state=document.getElementById('ef2-state')?.value||'';
  don.mobile=document.getElementById('ef2-mobile')?.value||'';
  don.donationType = nextType;
  if (don.donationType === 'money') {
    don.notes = '';
    don.amount=nextAmount; don.amountWords=nextAmountWords;
    don.received=nextReceived;
    // receiptDataUrl: null=no change, '__REMOVED__'=user cleared it, else=new image
    if (receiptDataUrl === '__REMOVED__') {
      don.receiptImage = null;
    } else if (receiptDataUrl) {
      don.receiptImage = receiptDataUrl;
    }
    // else: keep don.receiptImage unchanged
  } else {
    don.notes = nextNotes;
    don.amount = null;
    don.amountWords = '';
    don.received = 'no';
    don.receiptImage = null;
  }
  don.updatedAt=new Date().toISOString();
  // Any non-admin edit should (re)submit for admin approval.
  if (!canAdmin() && (don.approvalStatus || 'approved') !== 'pending_approval') {
    don.approvalStatus = 'pending_approval';
  }
  const rows = [
    pvRow('Type', don.donationType==='other'?'Other':'Money'),
    pvRow('Donor', don.name),
    pvRow('Date', don.date),
    pvRow('City', don.city),
    pvRow('Mobile', don.mobile),
    (don.donationType==='money'?pvRow('Amount', fmt(don.amount)):pvRow('Notes', don.notes)),
    (don.donationType==='money'?pvRow('Payment', (don.received==='yes'?'Received':'Pending')):''),
    pvRow('Approval', (don.approvalStatus==='approved'?'Approved':'Pending Approval'))
  ].filter(Boolean).join('');
  openPreviewModal('Confirm Donation Update', rows, async () => {
    await dbUpdate('donations', don);
    const id = don.id;
    window._postSaveNav = { page:'donation', id };
    editingDonId=null; receiptDataUrl=null;
    gotoPage('donation');
    viewingDonId = String(id);
    render();
    setTimeout(() => {
      viewingDonId = String(id);
      render();
      const el = document.querySelector(`[onclick*="toggleDonView('${id}')"]`);
      if (el && el.scrollIntoView) el.scrollIntoView({ block:'center', behavior:'smooth' });
    }, 60);
    const msg = !canAdmin() && don.approvalStatus==='pending_approval' ? '✓ Donation resubmitted for approval!' : '✓ Donation #'+String(don.serial).padStart(3,'0')+' updated!';
    showToast(msg);
  });
}

    render();
    showToast('🗑 Donation deleted');
  } catch(err) { showToast('✗ Error deleting'); console.error(err); }
}

async function deleteExpense(id, e) {
  if(e) e.stopPropagation();
  const exp = expenses.find(x => String(x.id) === String(id));
  if (!exp) return;
  if (!confirm(`Delete expense #${String(exp.serial).padStart(3,'0')} — ${exp.category||exp.title}?\n\nThis cannot be undone.`)) return;
  try {
    await dbDelete('expenses', id);
    expenses = expenses.filter(x => x.id !== id);
    viewingExpId = null;
    render();
    showToast('🗑 Expense deleted');
  } catch(err) { showToast('✗ Error deleting'); console.error(err); }
}

/* ─── RECEIPT FULL VIEW ─── */
function viewReceiptFull(id, e, type) {
  if(e) e.stopPropagation();
  const rec = type==='don' ? donations.find(d=>String(d.id)===String(id)) : expenses.find(x=>String(x.id)===String(id));
  if(!rec?.receiptImage) return;
  const w=window.open(); w.document.write(`<img src="${rec.receiptImage}" style="max-width:100%;height:auto">`);
}

/* ─── SIGNATURE ─── */
function initSig(id) {
  const cv=document.getElementById(id);
  if(!cv) return;
  const ratio=window.devicePixelRatio||1;
  const rect=cv.getBoundingClientRect();
  cv.width=rect.width*ratio; cv.height=rect.height*ratio;
  sigCtx=cv.getContext('2d');
  sigCtx.scale(ratio,ratio);
  sigCtx.strokeStyle='#2C1A00'; sigCtx.lineWidth=2; sigCtx.lineCap='round'; sigCtx.lineJoin='round';
  function pos(e){ const r=cv.getBoundingClientRect(); if(e.touches) return{x:e.touches[0].clientX-r.left,y:e.touches[0].clientY-r.top}; return{x:e.clientX-r.left,y:e.clientY-r.top}; }
  cv.onmousedown=e=>{sigDrawing=true;const p=pos(e);sigLX=p.x;sigLY=p.y;};
  cv.onmousemove=e=>{if(!sigDrawing)return;const p=pos(e);sigCtx.beginPath();sigCtx.moveTo(sigLX,sigLY);sigCtx.lineTo(p.x,p.y);sigCtx.stroke();sigLX=p.x;sigLY=p.y;};
  cv.onmouseup=()=>sigDrawing=false; cv.onmouseleave=()=>sigDrawing=false;
  cv.ontouchstart=e=>{e.preventDefault();sigDrawing=true;const p=pos(e);sigLX=p.x;sigLY=p.y;};
  cv.ontouchmove=e=>{e.preventDefault();if(!sigDrawing)return;const p=pos(e);sigCtx.beginPath();sigCtx.moveTo(sigLX,sigLY);sigCtx.lineTo(p.x,p.y);sigCtx.stroke();sigLX=p.x;sigLY=p.y;};
  cv.ontouchend=()=>sigDrawing=false;
}
function clearSig(){ if(sigCtx){const cv=document.getElementById('sigCanvas');const r=cv.getBoundingClientRect();sigCtx.clearRect(0,0,r.width,r.height);} }

/* ─── INIT ─── */
function showInitError(msg) {
  const sc = document.getElementById('screen');
  sc.innerHTML = `<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:70vh;gap:14px;padding:24px;text-align:center">
    <div style="font-size:40px">⚠️</div>
    <div style="font-size:14px;font-weight:700;color:var(--red)">${msg}</div>
    <div style="font-size:12px;color:var(--text3)">Check your internet connection and try again.</div>
    <button onclick="location.reload()" style="padding:12px 28px;background:linear-gradient(135deg,var(--saffron-dark),var(--saffron));color:#fff;border:none;border-radius:12px;font-size:13px;font-weight:700;cursor:pointer;box-shadow:0 4px 14px rgba(212,88,12,.35)">🔄 Reload App</button>
  </div>`;
}

async function start() {
  try {
    await loadAppConfig();
    await initFirebase();
    if (!fbConfigured) { showInitError('Could not connect to database.'); return; }
    let user = null;
    try { const s = localStorage.getItem('satram_session'); if (s) user = JSON.parse(s); } catch(e) {}
    // Restore persisted year state before any render
    _loadPersistedYears();
	    if (user && user.email) {
	      try {
	        currentUser = user;
	        if (!currentUser.role) currentUser.role = 'readonly';
	        isLoggedIn = true;
	        await loadDataFromDB();
	        trackActiveSession();
	      } catch (e) {
	        // If session restore fails while offline, keep the session and let the user continue.
	        const offline = !navigator.onLine;
	        console.warn('Session restore failed', e);
	        if (offline) {
	          showToast('📴 Offline mode: using saved session; data will sync when online');
	        } else {
	          // Online but restore failed: clear session to avoid a broken loop.
	          console.warn('Clearing local session', e);
	          currentUser = null;
	          isLoggedIn = false;
	          donations = [];
	          expenses = [];
	          try { localStorage.removeItem('satram_session'); } catch(_) {}
	          showToast('⚠️ Could not restore session. Please sign in again.');
	        }
	      }
	    }
    render();
  } catch(err) {
    console.error('Init error', err);
    showInitError('Failed to initialize: ' + err.message);
  }
}
/* wait up to 8 s for Firebase SDK scripts to finish loading, then start */
(function waitForFirebase(attempt) {
  if (typeof firebase !== 'undefined' && firebase.auth && firebase.firestore) {
    start();
  } else if (window._fbLoadErr || attempt >= 80) {
    document.getElementById('screen').innerHTML =
      `<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:70vh;gap:14px;padding:24px;text-align:center">
        <div style="font-size:40px">📡</div>
        <div style="font-size:14px;font-weight:700;color:var(--red)">Could not load Firebase SDK</div>
        <div style="font-size:12px;color:var(--text3);line-height:1.6">
          Please check your internet connection.<br>
          Firebase scripts must load from <b>gstatic.com</b>.<br>
          If you are on a restricted network, try a different connection.
        </div>
        <button onclick="location.reload()" style="padding:12px 28px;background:linear-gradient(135deg,var(--saffron-dark),var(--saffron));color:#fff;border:none;border-radius:12px;font-size:13px;font-weight:700;cursor:pointer;box-shadow:0 4px 14px rgba(212,88,12,.35)">🔄 Retry</button>
      </div>`;
  } else {
    setTimeout(function(){ waitForFirebase(attempt + 1); }, 100);
  }
})(0);

// Refresh UI on connectivity changes (offline/online pill + login offline button)
window.addEventListener('online',  () => { try { render(); } catch(_) {} });
window.addEventListener('offline', () => { try { render(); } catch(_) {} });
</script>
